# SessionLayer Control Plane — FR-SESS-3 session-limit deployment example (S25).
#
# The three cluster-default knobs are OPT-IN deployment config: unset, the stored
# operator_settings.default_* column stands (null = unlimited/none — the CP WARNs
# at boot when the concurrent cap is unlimited); set, the value is reconciled into
# operator_settings at bootstrap and is authoritative on each boot. Per-identity
# overrides are managed at runtime via POST /v1/session-limit-policies (the most
# restrictive matching value wins per knob; every stored value is ENFORCED).
#
# Recommended starting point — cap every identity by default:

# Concurrent sessions per identity (HARD cap at Authorize, fleet-wide).
#sessionlayer.session-limits.default-max-concurrent=3

# Max session duration in seconds (folded into grant_expiry; the Gateway tears
# the session down at expiry per its mid-session-expiry mode). 28800 = 8h.
#sessionlayer.session-limits.default-max-session-seconds=28800

# Idle timeout in seconds (signed into the decision context; the Gateway applies
# it tighten-only against its static idle bound). 1800 = 30m.
#sessionlayer.session-limits.default-idle-timeout-seconds=1800

# Break-glass is EXEMPT from all three (emergency access is never throttled by
# per-identity policy; it is gated by single-use tokens, Lock supremacy, and the
# mandatory-review activation instead).
