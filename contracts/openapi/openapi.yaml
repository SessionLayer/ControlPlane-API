openapi: 3.1.0
info:
  title: SessionLayer Control Plane API
  version: 0.1.0
  summary: Contract-first REST surface for the SessionLayer Control Plane.
  description: |
    The **SessionLayer Control Plane API** is the contract-first source of truth
    for the platform's REST surface (Design §13, FR-API-1). The UI and the GitOps
    reconciler are *clients* of this contract; server interfaces and typed clients
    are code-generated from this document, and CI fails if generated code drifts
    from the spec.

    **Session One scope.** Only the operational probes `GET /v1/healthz` and
    `GET /v1/version` are defined here. The full resource surface (nodes, rules,
    roles, sessions, recordings, JIT requests, locks, join-tokens, OTP,
    device-flow, pins, service-accounts, audit-events) is authored in later
    sessions. The security schemes below are declared now so later operations can
    reference them without re-litigating the contract.

    **Versioning.** The API is URI-versioned (`/v1`). See
    `contracts/VERSIONING.md` for the URI-versioning and N-1 compatibility policy.
  license:
    name: GPL-3.0-only
    identifier: GPL-3.0-only
  contact:
    name: SessionLayer
    url: https://github.com/SessionLayer
servers:
  - url: https://{host}
    description: Control Plane public base URL.
    variables:
      host:
        default: controlplane.sessionlayer.example
        description: The operator-configured Control Plane hostname.
tags:
  - name: meta
    description: Liveness, readiness, and version metadata probes. Public and unauthenticated.
  - name: locks
    description: Incident-response lock CRUD (Design §8.3). Platform-RBAC gated and audited.
  - name: join-tokens
    description: >-
      Agent join-token issuance & CRUD (Design §8.1; FR-JOIN-2). Single-use,
      self-destruct, short-TTL, node-scoped. Platform-RBAC gated (`node:enroll`)
      and audited, so an autoscaler/config-mgmt re-provisions an agent without a
      human (the GitHub-Actions-runner pattern).
  - name: jit-requests
    description: >-
      Just-in-time access requests & approval chain (Design §7; FR-ACC-2/3/4).
      Submit is open to any authenticated principal; approve/deny/revoke are
      platform-RBAC gated (`request:approve`). Self-approval is impossible;
      revoking an active grant also tears down live sessions via a Lock. Audited.
  - name: breakglass
    description: >-
      Break-glass credential management & activation review (Design §7; FR-ACC-6).
      Register FIDO2 `sk-ecdsa` public keys / issue single-use offline codes
      (platform-RBAC gated `breakglass:manage`); list activations and record the
      mandatory post-hoc review. Audited.
# Default security applied to operations that do not override it. The public
# meta probes below explicitly opt out with `security: []`. Declaring the three
# first-class schemes here (Design §13, FR-AUTH-17) fixes them in the contract.
security:
  - oidcBearer: []
  - clientCredentials: []
  - mtls: []
paths:
  /v1/healthz:
    get:
      operationId: getHealth
      summary: Liveness/readiness probe.
      description: |
        Reports whether the Control Plane is able to serve requests. Intended for
        load balancers and orchestrators. Public and unauthenticated; it MUST NOT
        disclose any identity, node, or policy information.
      tags:
        - meta
      security: []
      responses:
        '200':
          description: The Control Plane is healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              examples:
                healthy:
                  value:
                    status: pass
        '503':
          description: The Control Plane is not ready to serve requests.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '4XX':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/version:
    get:
      operationId: getVersion
      summary: Component and protocol version metadata.
      description: |
        Returns the Control Plane component name, its build version (SemVer), and
        the protocol version ranges it speaks on the CP<->Gateway gRPC plane and
        the Agent<->Gateway wire protocol. Public and unauthenticated.
      tags:
        - meta
      security: []
      responses:
        '200':
          description: Version metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionInfo'
              examples:
                current:
                  value:
                    component: SessionLayer Control Plane
                    version: 0.1.0
                    protocols:
                      controlPlaneGatewayGrpc:
                        min: '1.0'
                        max: '1.0'
                      agentGatewayWire:
                        min: '1.0'
                        max: '1.0'
        '4XX':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/oauth2/token:
    post:
      operationId: issueMachineToken
      summary: OAuth 2.0 client-credentials token endpoint (machine identity).
      description: |
        Machine consumers exchange a client credential — a `private_key_jwt`
        client assertion (RFC 7523) or a mutual-TLS client certificate,
        preferred over a static secret — for a short-lived CP-signed bearer
        token (Design §5.6, FR-AUTH-12). The token resolves to a first-class
        RBAC principal. The client authenticates itself here, so the endpoint is
        not behind the bearer/mTLS API gate; the `clientCredentials`/`mtls`
        schemes below document the accepted client-authentication methods.
      tags:
        - auth
      security:
        - clientCredentials: []
        - mtls: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
      responses:
        '200':
          description: An access token was issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/otp:
    post:
      operationId: issueOtp
      summary: Issue a single-use OTP for an identity (admin).
      description: |
        Server-generates a single-use, short-TTL OTP bound to an identity and
        allowed principals (Design §5.4, FR-AUTH-9). The raw OTP is returned once
        (for out-of-band delivery); only its hash is stored. Platform-RBAC gated
        (`user:manage`) and audited.
      tags:
        - auth
      responses:
        '201':
          description: An OTP was issued (raw value returned once).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssuedOtp'
        '400':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueOtpRequest'
  /v1/pins:
    get:
      operationId: listPins
      summary: List pins for an identity (admin).
      tags:
        - auth
      parameters:
        - name: identity
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The identity's pins.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PinList'
        '403':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createPin
      summary: Create an authN-shortcut pin (admin).
      description: |
        Pins a public-key fingerprint to `{identity, source-cidr, principals}`
        with a TTL capped at the authorization TTL (Design §5.5, FR-AUTH-10).
        Source IP is a deny-only reducer. Platform-RBAC gated + audited.
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePinRequest'
      responses:
        '201':
          description: The pin was created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PinResource'
        '400':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/pins/{pinId}:
    delete:
      operationId: revokePin
      summary: Revoke a pin (admin / offboarding / lock).
      tags:
        - auth
      parameters:
        - name: pinId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: The pin was revoked (idempotent).
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/service-accounts/{serviceAccountId}/credentials:
    post:
      operationId: issueServiceAccountCredential
      summary: Issue a machine-consumer credential (admin).
      description: |
        Issues a rotatable, revocable credential for a service account
        (FR-AUTH-12): a `private_key_jwt` public-key/JWKS reference, an mTLS
        certificate fingerprint, or (discouraged) a generated `client_secret`
        returned once. Stored hashed / by reference. Platform-RBAC gated +
        audited.
      tags:
        - auth
      parameters:
        - name: serviceAccountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueServiceAccountCredentialRequest'
      responses:
        '201':
          description: The credential was issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceAccountCredentialResource'
        '400':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/service-accounts/{serviceAccountId}/credentials/{credentialId}:
    delete:
      operationId: revokeServiceAccountCredential
      summary: Revoke a machine-consumer credential (admin).
      description: Revocation takes effect immediately (new sessions denied, FR-AUTH-12).
      tags:
        - auth
      parameters:
        - name: serviceAccountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: credentialId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: The credential was revoked (idempotent).
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/auth/device:
    post:
      operationId: beginDeviceFlow
      summary: Begin an OIDC device-authorization flow (RFC 8628).
      description: |
        Starts a device flow bound to the SSH source context (Design §5.2,
        FR-AUTH-3). Returns the user code + CP verification URI to present to the
        user, and the device code the caller polls with. Fallback-only. The
        caller is the Gateway (mTLS); S7 will move this onto the auth gRPC plane.
      tags:
        - auth
      security:
        - mtls: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BeginDeviceFlowRequest'
      responses:
        '201':
          description: A device flow was started.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceFlowResource'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/auth/device/poll:
    post:
      operationId: pollDeviceFlow
      summary: Poll a device flow for completion (RFC 8628).
      description: |
        Polls with the opaque device code (its own credential). Returns
        `pending` until the user approves at the verification page, then
        `authorized` with the resolved identity, or `denied`/`expired`. Public
        (the device code is the authenticator); rate-limited.
      tags:
        - auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PollDeviceFlowRequest'
      responses:
        '200':
          description: The current device-flow status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceFlowStatus'
        '400':
          $ref: '#/components/responses/Problem'
        '429':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/locks:
    get:
      operationId: listLocks
      summary: List active locks (admin).
      description: |
        Lists the current unexpired locks. Platform-RBAC gated (`lock:read`) +
        audited (Design §8.3; FR-LOCK-1). A lock is the incident-response deny
        primitive; the deny reason is operator-only.
      tags:
        - locks
      responses:
        '200':
          description: The active locks.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LockList'
        '403':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createLock
      summary: Create a lock (admin).
      description: |
        Creates an incident-response lock that blocks new session issuance AND
        tears down existing matching sessions on every Gateway (Design §8.3,
        §8.4; FR-LOCK-1/2), pushed over the actively-pushed deny-list. Ingest
        validation rejects an empty/unrecognised target; a fleet-wide lock
        requires an explicit `all: true`. Platform-RBAC gated (`lock:write`) +
        audited.
      tags:
        - locks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLockRequest'
      responses:
        '201':
          description: The lock was created and pushed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LockResource'
        '400':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/locks/{lockId}:
    delete:
      operationId: releaseLock
      summary: Release a lock (admin).
      description: |
        Releases (deletes) a lock; the removal is pushed to every Gateway.
        Releasing a lock only stops future denial — it never resurrects a
        torn-down session. Platform-RBAC gated (`lock:write`) + audited.
      tags:
        - locks
      parameters:
        - name: lockId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: The lock was released (idempotent).
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/join-tokens:
    get:
      operationId: listJoinTokens
      summary: List active join tokens (admin).
      description: |
        Lists the current unconsumed, unexpired join tokens. The raw token value
        is NEVER returned (only its metadata) — it is shown exactly once at
        issuance. Platform-RBAC gated (`node:enroll`) + audited (Design §8.1;
        FR-JOIN-2).
      tags:
        - join-tokens
      responses:
        '200':
          description: The active join tokens (metadata only, never the raw token).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinTokenList'
        '403':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: issueJoinToken
      summary: Issue an agent join token (admin).
      description: |
        Issues a short-lived, single-use, self-destruct join token bound to a
        stable node identity/scope (Design §8.1; FR-JOIN-2/6). The raw token is
        returned exactly ONCE (for out-of-band delivery to the joining Agent);
        only its SHA-256 hash is stored. Because issuance is a pure API
        operation, an autoscaler/config-mgmt re-provisions a token-join agent
        after a full lapse without a human. Platform-RBAC gated (`node:enroll`)
        + audited.
      tags:
        - join-tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueJoinTokenRequest'
      responses:
        '201':
          description: A join token was issued (raw value returned once).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssuedJoinToken'
        '400':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/join-tokens/{joinTokenId}:
    delete:
      operationId: revokeJoinToken
      summary: Revoke a join token (admin).
      description: |
        Revokes (deletes) an unconsumed join token so it can never be used.
        Idempotent. Revoking an already-consumed token has no effect on the
        identity it produced (revocation of an issued identity is a Lock, §8.1).
        Platform-RBAC gated (`node:enroll`) + audited.
      tags:
        - join-tokens
      parameters:
        - name: joinTokenId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: The join token was revoked (idempotent).
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/jit-requests:
    get:
      operationId: listJitRequests
      summary: List JIT requests (admin).
      description: |
        Lists JIT requests, optionally filtered by `state` or `requester` (Design
        §7; FR-ACC-2). Platform-RBAC gated (`request:approve`) + audited.
      tags:
        - jit-requests
      parameters:
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: requester
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: The JIT requests.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JitRequestList'
        '403':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: submitJitRequest
      summary: Submit a JIT access request.
      description: |
        Requests just-in-time access to a target node as a principal for a bounded
        duration (Design §7; FR-ACC-2/3). Open to any authenticated principal — the
        requester is recorded from the authenticated caller, never a body field. The
        matching JIT policy's approval chain is snapshotted; a zero-level chain
        auto-approves (but a Lock still denies on use). Audited.
      tags:
        - jit-requests
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JitRequestSubmission'
      responses:
        '201':
          description: The JIT request was submitted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JitRequestResource'
        '400':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/jit-requests/{jitRequestId}:
    get:
      operationId: getJitRequest
      summary: Get a JIT request (admin).
      tags:
        - jit-requests
      parameters:
        - name: jitRequestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The JIT request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JitRequestResource'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/jit-requests/{jitRequestId}/approve:
    post:
      operationId: approveJitRequest
      summary: Approve a JIT request level (admin).
      description: |
        Approves the next level of a pending JIT request (Design §7; FR-ACC-3/4).
        The approver can NEVER be the requester (self-approval impossible) and may
        act at most once; when all levels are approved the grant clock starts.
        Platform-RBAC gated (`request:approve`) + audited.
      tags:
        - jit-requests
      parameters:
        - name: jitRequestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JitDecisionRequest'
      responses:
        '200':
          description: The updated JIT request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JitRequestResource'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/jit-requests/{jitRequestId}/deny:
    post:
      operationId: denyJitRequest
      summary: Deny a JIT request (admin).
      description: |
        Denies a pending JIT request (terminal). The denier can never be the
        requester. Platform-RBAC gated (`request:approve`) + audited.
      tags:
        - jit-requests
      parameters:
        - name: jitRequestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JitDecisionRequest'
      responses:
        '200':
          description: The denied JIT request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JitRequestResource'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/jit-requests/{jitRequestId}/revoke:
    post:
      operationId: revokeJitRequest
      summary: Revoke an active JIT grant (admin).
      description: |
        Revokes an approved/active JIT grant (Design §7; FR-ACC-2). Also writes a
        strict Lock on the grant's identity+node so a LIVE session tears down
        (§8.4). Platform-RBAC gated (`request:approve`) + audited.
      tags:
        - jit-requests
      parameters:
        - name: jitRequestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JitDecisionRequest'
      responses:
        '200':
          description: The revoked JIT request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JitRequestResource'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/breakglass/credentials:
    get:
      operationId: listBreakglassCredentials
      summary: List break-glass credentials (admin).
      description: |
        Lists registered break-glass FIDO2 credentials (public metadata only)
        (Design §7; FR-ACC-6). Platform-RBAC gated (`breakglass:manage`) + audited.
      tags:
        - breakglass
      responses:
        '200':
          description: The break-glass credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BreakglassCredentialList'
        '403':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: registerBreakglassCredential
      summary: Register a break-glass FIDO2 key (admin).
      description: |
        Registers a break-glass FIDO2 `sk-ecdsa` PUBLIC key (Design §7; FR-ACC-6).
        Attestation is not required — an admin vouches for the key; only PUBLIC
        material and the SHA-256 fingerprint are stored. Platform-RBAC gated
        (`breakglass:manage`) + audited.
      tags:
        - breakglass
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterBreakglassCredentialRequest'
      responses:
        '201':
          description: The credential was registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BreakglassCredentialResource'
        '400':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/breakglass/credentials/{credentialId}:
    delete:
      operationId: revokeBreakglassCredential
      summary: Revoke a break-glass credential (admin).
      description: |
        Revokes (soft, `revoked_at`) a registered break-glass credential.
        Idempotent. Platform-RBAC gated (`breakglass:manage`) + audited.
      tags:
        - breakglass
      parameters:
        - name: credentialId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: The credential was revoked (idempotent).
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/breakglass/offline-codes:
    get:
      operationId: listBreakglassOfflineCodes
      summary: List break-glass offline codes (admin).
      description: |
        Lists issued offline-code metadata (NEVER the raw codes) (Design §7;
        FR-ACC-6). Platform-RBAC gated (`breakglass:manage`) + audited.
      tags:
        - breakglass
      responses:
        '200':
          description: The offline-code metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BreakglassOfflineCodeList'
        '403':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: issueBreakglassOfflineCodes
      summary: Issue a batch of break-glass offline codes (admin).
      description: |
        Issues a batch of single-use break-glass offline codes (Design §7;
        FR-ACC-6). The raw codes are returned exactly ONCE; only their SHA-256
        hashes are stored. Platform-RBAC gated (`breakglass:manage`) + audited.
      tags:
        - breakglass
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueBreakglassOfflineCodesRequest'
      responses:
        '201':
          description: The codes were issued (raw values returned once).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssuedBreakglassOfflineCodes'
        '400':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/breakglass/activations:
    get:
      operationId: listBreakglassActivations
      summary: List break-glass activations (admin).
      description: |
        Lists break-glass activations, optionally filtered by `reviewStatus`
        (Design §7; FR-ACC-6/FR-AUD-7). An unreviewed activation is a standing
        signal. Platform-RBAC gated (`breakglass:manage`) + audited.
      tags:
        - breakglass
      parameters:
        - name: reviewStatus
          in: query
          required: false
          schema:
            type: string
            enum:
              - pending
              - reviewed
      responses:
        '200':
          description: The break-glass activations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BreakglassActivationList'
        '403':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/breakglass/activations/{activationId}/review:
    post:
      operationId: reviewBreakglassActivation
      summary: Record the mandatory review of a break-glass activation (admin).
      description: |
        Records the mandatory post-hoc review of a break-glass activation (Design
        §7; FR-ACC-6/FR-AUD-7). Platform-RBAC gated (`breakglass:manage`) +
        audited.
      tags:
        - breakglass
      parameters:
        - name: activationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewBreakglassActivationRequest'
      responses:
        '200':
          description: The reviewed activation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BreakglassActivationResource'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
components:
  securitySchemes:
    oidcBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        OIDC bearer access via an ID/JWT token validated by the Control Plane
        (Design §5.7, FR-AUTH-17). The ID token is the authentication proof.
    clientCredentials:
      type: oauth2
      description: |
        OAuth 2.0 client-credentials for machine consumers (Design §5.6,
        FR-AUTH-12). `private_key_jwt`/mTLS client authentication is preferred
        over static secrets.
      flows:
        clientCredentials:
          tokenUrl: https://controlplane.sessionlayer.example/oauth2/token
          scopes: {}
    mtls:
      type: mutualTLS
      description: |
        Mutual TLS client-certificate authentication (Design §5.7, FR-AUTH-17),
        also used by the internal CP<->Gateway plane.
  responses:
    Problem:
      description: An error occurred. The body is an RFC 9457 problem document.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
  schemas:
    ProblemDetails:
      type: object
      title: RFC 9457 Problem Details
      description: |
        Problem details for HTTP APIs as defined by RFC 9457 (obsoletes RFC 7807).
        Error responses use media type `application/problem+json`.
      properties:
        type:
          type: string
          format: uri-reference
          default: about:blank
          description: A URI reference identifying the problem type.
        title:
          type: string
          description: A short, human-readable summary of the problem type.
        status:
          type: integer
          format: int32
          minimum: 100
          maximum: 599
          description: The HTTP status code.
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence.
        instance:
          type: string
          format: uri-reference
          description: A URI reference identifying the specific occurrence.
      additionalProperties: true
    HealthStatus:
      type: object
      title: Health Status
      description: Liveness/readiness result, loosely modelled on the IETF health-check draft.
      required:
        - status
      properties:
        status:
          type: string
          description: Overall health indicator.
          enum:
            - pass
            - fail
            - warn
      additionalProperties: false
    ProtocolVersionRange:
      type: object
      title: Protocol Version Range
      description: An inclusive range of supported protocol versions, `major.minor` strings.
      required:
        - min
        - max
      properties:
        min:
          type: string
          pattern: '^[0-9]+\.[0-9]+$'
          description: Inclusive lowest supported protocol version, e.g. "1.0".
        max:
          type: string
          pattern: '^[0-9]+\.[0-9]+$'
          description: Inclusive highest supported protocol version, e.g. "1.0".
      additionalProperties: false
    VersionInfo:
      type: object
      title: Version Info
      description: Component build version and the protocol ranges it negotiates.
      required:
        - component
        - version
        - protocols
      properties:
        component:
          type: string
          description: Formal component name.
        version:
          type: string
          description: Component build version (SemVer 2.0.0).
        protocols:
          type: object
          title: Protocol Ranges
          description: Supported protocol version ranges by plane.
          required:
            - controlPlaneGatewayGrpc
            - agentGatewayWire
          properties:
            controlPlaneGatewayGrpc:
              $ref: '#/components/schemas/ProtocolVersionRange'
            agentGatewayWire:
              $ref: '#/components/schemas/ProtocolVersionRange'
          additionalProperties: false
      additionalProperties: false
    TokenRequest:
      type: object
      title: OAuth Token Request
      description: |
        Client-credentials token request (Design §5.6). Sent as
        `application/x-www-form-urlencoded`. Client authentication is by
        `client_assertion` (private_key_jwt) or by the mTLS client certificate;
        a static `client_secret` is accepted but discouraged.
      required:
        - grant_type
      properties:
        grant_type:
          type: string
          description: Must be `client_credentials`.
        client_id:
          type: string
        client_assertion_type:
          type: string
          description: 'For private_key_jwt: urn:ietf:params:oauth:client-assertion-type:jwt-bearer.'
        client_assertion:
          type: string
          description: The signed JWT client assertion (RFC 7523).
        client_secret:
          type: string
          description: Discouraged static secret (only if the SA uses client_secret).
        scope:
          type: string
      additionalProperties: false
    TokenResponse:
      type: object
      title: OAuth Token Response
      required:
        - access_token
        - token_type
        - expires_in
      properties:
        access_token:
          type: string
          description: The short-lived CP-signed bearer token.
        token_type:
          type: string
          description: Always `Bearer`.
        expires_in:
          type: integer
          format: int64
          description: Token lifetime in seconds.
        scope:
          type: string
      additionalProperties: false
    IssueOtpRequest:
      type: object
      title: Issue OTP Request
      required:
        - identity
        - allowedPrincipals
      properties:
        identity:
          type: string
          description: The identity the OTP authenticates (taken from the record, never client input at validation).
        allowedPrincipals:
          type: array
          items:
            type: string
        sourceCidr:
          type: string
          description: Optional source-CIDR binding (deny-only reducer).
        ttlSeconds:
          type: integer
          format: int32
          description: OTP lifetime (60–300s); defaults to the operator setting.
      additionalProperties: false
    IssuedOtp:
      type: object
      title: Issued OTP
      required:
        - otpId
        - otp
        - expiresAt
      properties:
        otpId:
          type: string
          format: uuid
        otp:
          type: string
          description: The raw OTP, returned ONCE for out-of-band delivery; only its hash is stored.
        expiresAt:
          type: string
          format: date-time
      additionalProperties: false
    CreatePinRequest:
      type: object
      title: Create Pin Request
      required:
        - fingerprint
        - identity
        - principals
        - ttlSeconds
      properties:
        fingerprint:
          type: string
          description: The pinned public-key fingerprint (SHA256:...).
        identity:
          type: string
        sourceCidr:
          type: string
          description: Source-CIDR binding (deny-only reducer, FR-AUTH-15).
        principals:
          type: array
          items:
            type: string
        ttlSeconds:
          type: integer
          format: int64
          description: Pin lifetime; capped at the authorization TTL (FR-AUTH-10).
      additionalProperties: false
    PinResource:
      type: object
      title: Pin
      required:
        - id
        - fingerprint
        - identity
        - principals
        - expiresAt
      properties:
        id:
          type: string
          format: uuid
        fingerprint:
          type: string
        identity:
          type: string
        sourceCidr:
          type: string
        principals:
          type: array
          items:
            type: string
        expiresAt:
          type: string
          format: date-time
        revokedAt:
          type: string
          format: date-time
      additionalProperties: false
    PinList:
      type: object
      title: Pin List
      required:
        - pins
      properties:
        pins:
          type: array
          items:
            $ref: '#/components/schemas/PinResource'
      additionalProperties: false
    IssueServiceAccountCredentialRequest:
      type: object
      title: Issue Service-Account Credential Request
      required:
        - credentialType
      properties:
        credentialType:
          type: string
          enum:
            - private_key_jwt
            - mtls
            - client_secret
        publicKeyPem:
          type: string
          description: For private_key_jwt — the client's public key (PEM). Public material only.
        jwksUri:
          type: string
          description: For private_key_jwt — a JWKS URI reference (alternative to publicKeyPem).
        certificateFingerprint:
          type: string
          description: For mtls — the client certificate SHA-256 fingerprint.
        ttlSeconds:
          type: integer
          format: int64
          description: Credential validity; null = non-expiring until revoked.
      additionalProperties: false
    ServiceAccountCredentialResource:
      type: object
      title: Service-Account Credential
      required:
        - id
        - serviceAccountId
        - credentialType
        - status
        - issuedAt
      properties:
        id:
          type: string
          format: uuid
        serviceAccountId:
          type: string
          format: uuid
        credentialType:
          type: string
        fingerprint:
          type: string
        clientSecret:
          type: string
          description: For client_secret — the raw secret, returned ONCE; only its hash is stored.
        status:
          type: string
        issuedAt:
          type: string
          format: date-time
        notAfter:
          type: string
          format: date-time
      additionalProperties: false
    BeginDeviceFlowRequest:
      type: object
      title: Begin Device Flow Request
      properties:
        sourceIp:
          type: string
          description: The SSH source IP to bind for anti-phishing correlation (§5.2).
        connectionBinding:
          type: string
          description: An opaque 1:1 device-code↔connection binding value.
      additionalProperties: false
    DeviceFlowResource:
      type: object
      title: Device Flow
      required:
        - deviceFlowId
        - userCode
        - verificationUri
        - deviceCode
        - interval
        - expiresIn
      properties:
        deviceFlowId:
          type: string
          format: uuid
        userCode:
          type: string
          description: The short code the user enters at the verification page.
        verificationUri:
          type: string
          description: The CP-hosted verification page URL.
        verificationUriComplete:
          type: string
          description: Verification URI with the user code embedded (convenience).
        deviceCode:
          type: string
          description: The opaque device code the caller polls with (its own credential).
        interval:
          type: integer
          format: int32
          description: Minimum poll interval in seconds.
        expiresIn:
          type: integer
          format: int64
          description: Seconds until the flow expires.
      additionalProperties: false
    PollDeviceFlowRequest:
      type: object
      title: Poll Device Flow Request
      required:
        - deviceCode
      properties:
        deviceCode:
          type: string
      additionalProperties: false
    DeviceFlowStatus:
      type: object
      title: Device Flow Status
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - pending
            - authorized
            - denied
            - expired
        identity:
          type: string
          description: The resolved identity, present when status=authorized.
        sourceContextMatch:
          type: boolean
          description: Whether the approving browser source correlated with the SSH source (§5.2).
      additionalProperties: false
    LockTarget:
      type: object
      title: Lock Target
      description: |
        What the lock matches (S5 LockMatching facets; OR-matched). At least one
        facet must be non-empty, OR `all` must be true — a global lock is never
        implicit (ingest rejects an empty target).
      properties:
        identities:
          type: array
          items:
            type: string
          description: Resolved subject identities to deny.
        groups:
          type: array
          items:
            type: string
          description: SSO/OIDC groups to deny (membership match).
        nodeIds:
          type: array
          items:
            type: string
            format: uuid
          description: Target node ids to deny.
        principals:
          type: array
          items:
            type: string
          description: Linux logins (principals) to deny.
        nodeLabels:
          type: array
          items:
            type: string
          description: Node labels ("key=value") to deny.
        all:
          type: boolean
          description: An explicit fleet-wide lock (deny everything). Required for a target with no other facet.
      additionalProperties: false
    CreateLockRequest:
      type: object
      title: Create Lock Request
      required:
        - target
        - reason
      properties:
        target:
          $ref: '#/components/schemas/LockTarget'
        reason:
          type: string
          description: Operator/audit reason (mandatory). Never disclosed to the SSH user (§7.1).
        ttlSeconds:
          type: integer
          format: int64
          description: Optional lock lifetime in seconds; omitted or null = no expiry (indefinite until released).
      additionalProperties: false
    LockResource:
      type: object
      title: Lock
      required:
        - id
        - target
        - reason
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        target:
          $ref: '#/components/schemas/LockTarget'
        reason:
          type: string
        expiresAt:
          type: string
          format: date-time
          description: Absolute expiry; absent when the lock has no TTL.
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
          description: The admin identity that created the lock.
      additionalProperties: false
    LockList:
      type: object
      title: Lock List
      required:
        - locks
      properties:
        locks:
          type: array
          items:
            $ref: '#/components/schemas/LockResource'
      additionalProperties: false
    IssueJoinTokenRequest:
      type: object
      title: Issue Join Token Request
      description: Request to mint a single-use agent join token bound to a node.
      required:
        - nodeName
      properties:
        nodeName:
          type: string
          minLength: 1
          maxLength: 253
          description: >-
            The stable node identity the token authorizes an agent to join as
            (FR-JOIN-6). The token is scoped to exactly this node.
        ttlSeconds:
          type: integer
          format: int32
          minimum: 1
          description: >-
            Optional TTL override (seconds). Omitted uses the configured default;
            the value is clamped to the configured maximum. Join tokens are
            short-lived by design.
      additionalProperties: false
    IssuedJoinToken:
      type: object
      title: Issued Join Token
      description: >-
        A freshly issued join token. The `token` field is the raw single-use
        bearer value and is returned exactly ONCE; only its hash is stored.
      required:
        - id
        - token
        - nodeName
        - joinMethod
        - singleUse
        - expiresAt
      properties:
        id:
          type: string
          format: uuid
        token:
          type: string
          description: The raw single-use join token. Shown once; never retrievable again.
        nodeName:
          type: string
        joinMethod:
          type: string
          enum:
            - token
        singleUse:
          type: boolean
        expiresAt:
          type: string
          format: date-time
      additionalProperties: false
    JoinTokenResource:
      type: object
      title: Join Token
      description: Join-token metadata (never the raw token).
      required:
        - id
        - nodeName
        - joinMethod
        - singleUse
        - expiresAt
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        nodeName:
          type: string
        joinMethod:
          type: string
          enum:
            - token
        singleUse:
          type: boolean
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
          description: The admin identity that issued the token.
      additionalProperties: false
    JoinTokenList:
      type: object
      title: Join Token List
      required:
        - joinTokens
      properties:
        joinTokens:
          type: array
          items:
            $ref: '#/components/schemas/JoinTokenResource'
      additionalProperties: false
    JitRequestSubmission:
      type: object
      title: JIT Request Submission
      description: A just-in-time access request. The requester is the authenticated caller, never a field.
      required:
        - targetNodeId
        - principal
        - reason
      properties:
        targetNodeId:
          type: string
          format: uuid
          description: The target node to request JIT access to.
        principal:
          type: string
          description: The Linux login requested (must be within what the JIT policy allows).
        capabilities:
          type: array
          description: Requested capabilities (narrowed to the policy's set; default = the policy set).
          items:
            type: string
        reason:
          type: string
          description: The justification for the request (audited).
      additionalProperties: false
    JitDecisionRequest:
      type: object
      title: JIT Decision Request
      description: The optional reason attached to an approve/deny/revoke action.
      properties:
        reason:
          type: string
      additionalProperties: false
    JitApprovalLevel:
      type: object
      title: JIT Approval Level
      properties:
        kind:
          type: string
          enum:
            - email
            - oidc_group
        value:
          type: string
      additionalProperties: false
    JitApproval:
      type: object
      title: JIT Approval Entry
      properties:
        approver:
          type: string
        level:
          type: integer
          format: int32
        decision:
          type: string
        reason:
          type: string
        at:
          type: string
      additionalProperties: false
    JitRequestResource:
      type: object
      title: JIT Request
      required:
        - id
        - requester
        - principal
        - reason
        - state
        - requestedAt
      properties:
        id:
          type: string
          format: uuid
        requester:
          type: string
        targetNodeId:
          type: string
          format: uuid
        targetNodeName:
          type: string
        principal:
          type: string
        capabilities:
          type: array
          items:
            type: string
        reason:
          type: string
        state:
          type: string
          description: REQUESTED | PENDING_APPROVAL | APPROVED | DENIED | EXPIRED | ACTIVE | REVOKED.
        jitPolicyName:
          type: string
        approvalChain:
          type: array
          items:
            $ref: '#/components/schemas/JitApprovalLevel'
        approvals:
          type: array
          items:
            $ref: '#/components/schemas/JitApproval'
        approvalDeadline:
          type: string
          format: date-time
        grantExpiresAt:
          type: string
          format: date-time
        requestedAt:
          type: string
          format: date-time
        decidedAt:
          type: string
          format: date-time
        decidedBy:
          type: string
      additionalProperties: false
    JitRequestList:
      type: object
      title: JIT Request List
      required:
        - jitRequests
      properties:
        jitRequests:
          type: array
          items:
            $ref: '#/components/schemas/JitRequestResource'
      additionalProperties: false
    RegisterBreakglassCredentialRequest:
      type: object
      title: Register Break-glass Credential Request
      description: Registers a break-glass FIDO2 sk-ecdsa PUBLIC key. Public material only.
      required:
        - publicKey
        - identity
        - allowedPrincipals
      properties:
        publicKey:
          type: string
          format: byte
          description: The OpenSSH sk-ecdsa-sha2-nistp256 wire pubkey blob (base64). PUBLIC.
        identity:
          type: string
          description: The break-glass operator identity this key resolves to.
        allowedPrincipals:
          type: array
          items:
            type: string
        nodeIds:
          type: array
          description: Optional node scope (a fleet credential omits it).
          items:
            type: string
            format: uuid
        expiresAt:
          type: string
          format: date-time
          description: Optional expiry (a hardware token is durable; omit for none).
      additionalProperties: false
    BreakglassCredentialResource:
      type: object
      title: Break-glass Credential
      required:
        - id
        - keyFingerprint
        - identity
        - allowedPrincipals
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        keyFingerprint:
          type: string
          description: The OpenSSH SHA256 fingerprint of the registered key.
        skApplication:
          type: string
        identity:
          type: string
        allowedPrincipals:
          type: array
          items:
            type: string
        nodeIds:
          type: array
          items:
            type: string
            format: uuid
        expiresAt:
          type: string
          format: date-time
        revokedAt:
          type: string
          format: date-time
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
      additionalProperties: false
    BreakglassCredentialList:
      type: object
      title: Break-glass Credential List
      required:
        - credentials
      properties:
        credentials:
          type: array
          items:
            $ref: '#/components/schemas/BreakglassCredentialResource'
      additionalProperties: false
    IssueBreakglassOfflineCodesRequest:
      type: object
      title: Issue Break-glass Offline Codes Request
      required:
        - identity
        - allowedPrincipals
      properties:
        identity:
          type: string
        allowedPrincipals:
          type: array
          items:
            type: string
        nodeIds:
          type: array
          items:
            type: string
            format: uuid
        sourceCidr:
          type: string
          description: Optional source-CIDR binding (deny-only reducer).
        count:
          type: integer
          format: int32
          description: How many codes to issue (default 10).
        ttlSeconds:
          type: integer
          format: int64
          description: Code lifetime (default 90d).
      additionalProperties: false
    IssuedBreakglassOfflineCodes:
      type: object
      title: Issued Break-glass Offline Codes
      required:
        - ids
        - codes
        - expiresAt
      properties:
        ids:
          type: array
          items:
            type: string
            format: uuid
        codes:
          type: array
          description: The raw offline codes, returned ONCE; only their hashes are stored.
          items:
            type: string
        expiresAt:
          type: string
          format: date-time
      additionalProperties: false
    BreakglassOfflineCodeResource:
      type: object
      title: Break-glass Offline Code
      description: Offline-code metadata (never the raw code).
      required:
        - id
        - identity
        - expiresAt
        - used
      properties:
        id:
          type: string
          format: uuid
        identity:
          type: string
        allowedPrincipals:
          type: array
          items:
            type: string
        sourceCidr:
          type: string
        expiresAt:
          type: string
          format: date-time
        used:
          type: boolean
        usedAt:
          type: string
          format: date-time
        revokedAt:
          type: string
          format: date-time
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
      additionalProperties: false
    BreakglassOfflineCodeList:
      type: object
      title: Break-glass Offline Code List
      required:
        - offlineCodes
      properties:
        offlineCodes:
          type: array
          items:
            $ref: '#/components/schemas/BreakglassOfflineCodeResource'
      additionalProperties: false
    BreakglassActivationResource:
      type: object
      title: Break-glass Activation
      required:
        - id
        - principal
        - reason
        - reviewStatus
        - activatedAt
      properties:
        id:
          type: string
          format: uuid
        identity:
          type: string
        principal:
          type: string
        reason:
          type: string
        alertRef:
          type: string
        breakglassPolicyName:
          type: string
        reviewStatus:
          type: string
          enum:
            - pending
            - reviewed
        reviewer:
          type: string
        sourceIp:
          type: string
        targetNodeId:
          type: string
          format: uuid
        credentialRef:
          type: string
        activatedAt:
          type: string
          format: date-time
        reviewedAt:
          type: string
          format: date-time
      additionalProperties: false
    BreakglassActivationList:
      type: object
      title: Break-glass Activation List
      required:
        - activations
      properties:
        activations:
          type: array
          items:
            $ref: '#/components/schemas/BreakglassActivationResource'
      additionalProperties: false
    ReviewBreakglassActivationRequest:
      type: object
      title: Review Break-glass Activation Request
      properties:
        note:
          type: string
      additionalProperties: false
