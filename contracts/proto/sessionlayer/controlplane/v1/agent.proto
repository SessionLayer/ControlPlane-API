syntax = "proto3";

package sessionlayer.controlplane.v1;

import "sessionlayer/controlplane/v1/common.proto";

option java_multiple_files = true;
option java_package = "io.sessionlayer.controlplane.grpc.v1";
option java_outer_classname = "AgentProto";

// AgentIdentity bootstraps and renews a per-node Agent's CP-facing mTLS X.509
// identity (Design §8 agent join & credential lifecycle; FR-JOIN-1/3/4/6). Added
// in Session Twelve — the first real Agent-repo session. It mirrors the
// GatewayIdentity service (Session Four) deliberately: the durable credential is
// ALWAYS a renewable internal mTLS X.509 identity carrying a generation counter
// (§8.2), regardless of which JoinMethod bootstrapped it (D25/D28) — this keeps
// the fragile OpenSSH-cert assembler off the renewal path. Additive; protocol
// stays 1.1 (N-1 window live since S4).
//
// TRUST MODEL. The whole CP<->Agent gRPC plane runs over TLS 1.3 and the CP
// always presents a server certificate issued by the internal mTLS CA. Client
// (Agent) certificate authentication is REQUIRED for every RPC EXCEPT
// EnrollAgent: a not-yet-joined Agent holds no CP-issued client certificate, so
// EnrollAgent is authenticated by the method-specific JoinMethod PROOF instead
// (the documented bootstrap exception, mirroring EnrollGateway). Every other RPC
// — RenewAgentIdentity — is refused without a valid client certificate chained
// to the internal CA that resolves to an active, unlocked agent_identity. All
// rejection paths fail closed (NFR-2, §8.4).
//
// KEY CUSTODY. The Agent generates its mTLS keypair locally and sends only a
// PKCS#10 CSR (public key + proof of possession). The CP returns a signed
// certificate; the Agent's mTLS private key never leaves the Agent (D2/§15).
//
// REVOCATION. For EVERY join method, revocation is via lock + generation counter
// (§8.1) — no join method is a standing bypass. A locked agent_identity (or a
// lock matching its node) is refused for renew AND for re-enroll (fail closed),
// so a self-healing delegated/mtls method can never silently re-provision around
// an incident lock.
service AgentIdentity {
  // EnrollAgent bootstraps an Agent via a JoinMethod proof and issues its first
  // renewable mTLS identity (generation 0), bound to a stable per-node identity
  // (FR-JOIN-6 — no shared fleet credential). Reachable WITHOUT a CP-issued
  // client certificate (the bootstrap exception): the join proof is the
  // credential. A TokenJoin token is single-use and atomically consumed (replay
  // rejected); an OidcJoin workload token is verified against the issuer's JWKS
  // with an alg allow-list + iss/aud/exp (no shared secret); an MtlsJoin proof
  // proves possession of an operator-PKI cert bound to this specific CSR. Any
  // invalid/replayed proof, or a node already actively enrolled, or a lock
  // covering the node, fails closed.
  rpc EnrollAgent(EnrollAgentRequest) returns (EnrollAgentResponse);

  // RenewAgentIdentity rotates the caller's mTLS certificate and increments the
  // generation counter (persist-before-adopt on the Agent side). REQUIRES the
  // caller's CURRENT CP-issued mTLS client certificate; a locked/revoked
  // identity or a generation mismatch is refused and flagged as a security event
  // (§8.2 — the clone-detection primitive: a cloned credential forks the counter,
  // the stale copy is detected, and both are locked with no auto-clear).
  rpc RenewAgentIdentity(RenewAgentIdentityRequest) returns (RenewAgentIdentityResponse);
}

// EnrollAgentRequest carries the CSR, the claimed node identity, and exactly one
// JoinMethod proof.
message EnrollAgentRequest {
  // A PKCS#10 CertificationRequest (DER) generated by the Agent. The CP receives
  // only the CSR and returns a signed cert; the private key stays on the Agent.
  bytes pkcs10_csr = 1;

  // The stable node identity the Agent claims (the enrollment key, unique per
  // node). The presented proof MUST authorize this node; the issued identity is
  // bound to the resolved node so two nodes get distinct credentials (FR-JOIN-6).
  string node_name = 2;

  // The connecting Agent's identity/version, for diagnostics and version
  // negotiation. Carries NO secrets.
  ComponentInfo client = 3;

  // The method-specific bootstrap proof (FR-JOIN-1). Exactly one must be set; an
  // unset/unknown proof fails closed. The three in-scope methods are token,
  // delegated-OIDC, and operator-mTLS; bound-keypair and further delegated
  // methods (AWS IAM/GCP/Azure) are a documented interface seam (§17), added
  // later as new proof variants without a breaking change.
  oneof proof {
    TokenJoinProof token = 4;
    OidcJoinProof oidc = 5;
    MtlsJoinProof mtls = 6;
  }
}

// TokenJoin proof — a short-lived, single-use, self-destruct join token issued
// by the CP join-token API (POST /v1/join-tokens; FR-JOIN-2). The CP looks the
// token up by its SHA-256 hash, verifies scope + expiry, and atomically consumes
// it (a concurrent replay loses the optimistic-lock race). The raw token is
// never stored server-side.
message TokenJoinProof {
  // The raw single-use join token (bearer). Verified + burned CP-side.
  string join_token = 1;
}

// OidcJoin proof — a delegated workload identity (Kubernetes ServiceAccount, CI
// runner, or cloud workload OIDC). The CP verifies the token against the
// configured issuer's JWKS with a positive alg allow-list and iss/aud/exp/nbf
// checks (the same rigor as the user-facing OIDC RP, §5.3), then maps the
// verified subject/claims to the allowed node via configured join bindings.
// NO shared secret is held by the platform (§8.1).
message OidcJoinProof {
  // A workload OIDC JWT in compact serialization (the ID/SA token). Verified
  // against the issuer; never a bearer secret the platform stores.
  string workload_token = 1;
}

// MtlsJoin proof — the operator pre-provisioned an Agent certificate via existing
// PKI. The Agent proves possession of that certificate's private key by signing
// a binding over THIS enrollment's CSR, so the proof cannot be replayed to
// enroll a different key. The CP verifies the certificate chains to the
// configured operator CA trust anchor, is currently valid, its subject identity
// matches node_name, and the signature verifies.
message MtlsJoinProof {
  // The operator-issued Agent leaf certificate (DER). Chained to the configured
  // operator CA; its CN/SAN must match node_name.
  bytes operator_certificate = 1;

  // Proof of possession: an ECDSA-P256/SHA-256 signature (ASN.1 DER) by the
  // operator certificate's private key over the bytes
  //   "sessionlayer-mtls-join-pop-v1:" || pkcs10_csr
  // binding the pre-provisioned identity to this specific CSR.
  bytes pop_signature = 2;
}

// EnrollAgentResponse returns the issued identity certificate and trust chain.
message EnrollAgentResponse {
  // The issued mTLS X.509 leaf certificate (DER).
  bytes certificate = 1;

  // The issuing CA chain (DER; issuing CA first, root last). The Agent pins this
  // as the trust anchor for the CP's server certificate and uses the leaf + its
  // private key to present its own client certificate thereafter.
  repeated bytes ca_chain = 2;

  // The CP-assigned agent_identity id (UUID string) — the stable principal id.
  string agent_id = 3;

  // The resolved node id (UUID string) the credential is bound to (FR-JOIN-6).
  string node_id = 4;

  // Generation counter of the issued identity. Enrollment always issues 0.
  uint64 generation = 5;

  // Certificate validity as Unix epoch seconds (UTC). not_before is backdated for
  // clock skew (FR-BOOT-4); the Agent expires the credential conservatively.
  int64 not_before_epoch_seconds = 6;
  int64 not_after_epoch_seconds = 7;
}

// RenewAgentIdentityRequest rotates an existing identity. Authenticated by the
// caller's CURRENT mTLS client certificate (not a join proof).
message RenewAgentIdentityRequest {
  // A fresh PKCS#10 CSR (DER) for the renewed identity.
  bytes pkcs10_csr = 1;

  // The generation the Agent currently holds. The CP issues current_generation +
  // 1 and enforces monotonicity; a mismatch is a security event (§8.2 — refused,
  // the identity auto-locked, and a security alert raised, no auto-clear).
  uint64 current_generation = 2;

  // The caller's identity/version. Carries NO secrets.
  ComponentInfo client = 3;
}

// RenewAgentIdentityResponse mirrors EnrollAgentResponse with the new generation.
message RenewAgentIdentityResponse {
  bytes certificate = 1;
  repeated bytes ca_chain = 2;
  string agent_id = 3;
  string node_id = 4;

  // The new generation (== current_generation + 1).
  uint64 generation = 5;

  int64 not_before_epoch_seconds = 6;
  int64 not_after_epoch_seconds = 7;
}
