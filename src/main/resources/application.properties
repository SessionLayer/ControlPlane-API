spring.application.name=controlplane

# Build version, resource-filtered from the Maven project version at package time.
# Single source of truth for the SemVer reported by GET /v1/version.
application.version=@project.version@

# ===================== REST server =====================
server.port=8080
# Defense-in-depth slow-client timeouts (prod also sits behind an L7 LB, Design §14).
server.netty.connection-timeout=10s
server.netty.idle-timeout=60s
# Graceful shutdown (M5): finish in-flight requests within the deadline, then close.
# Readiness flips to OUT_OF_SERVICE first so the LB stops routing before the drain.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=15s
# Honor forwarded headers so the client IP behind the L7 LB (Design §14/§5.7) drives
# the per-source rate-limit buckets, the OTP source-CIDR deny reducer, and the device-
# flow source-context correlation. MUST sit behind a trusted proxy that strips any
# client-supplied X-Forwarded-* (FR-AUTH-14): source IP is deny-only, never positive
# evidence, so a spoof from a non-LB peer can only over-restrict, never grant.
server.forward-headers-strategy=framework

# ===================== Actuator ========================
# Expose only health + info. Health drives readiness/liveness (incl. the R2DBC
# DB check); it MUST NOT leak identity/node/policy detail, so show-details=never.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
# The WORM store health contributor ('worm') reports the store's true reachability on
# /actuator/health for alerting, but does NOT gate readiness by default: WORM is a
# shared store, so an outage is cluster-wide and gating would deregister every CP
# (auth/CA/RBAC/audit-query too) + defeat incident response. To gate readiness on WORM
# for a per-CP/node-local store, add worm to the readiness group's include (standard
# Boot): management.endpoint.health.group.readiness.include=readinessState,worm

# ===================== OpenTelemetry tracing (S21 Part C, §14) =====================
# One distributed trace ties stock-client -> Gateway -> CP (authorize + cert-sign) ->
# node (OTEL-CONTRACT); the Gateway is the trace ROOT and propagates W3C context over
# the CP<->GW gRPC plane, so the CP's cp.authorize/cp.cert_sign spans join that trace.
# The tracer is always present (spans correlate local logs), but the OTLP EXPORTER is
# OFF by default: spans ship off-box ONLY when an OTLP endpoint is configured AND export
# is enabled. With neither set, only local Logback runs, unchanged. Spans carry IDs /
# enums / outcomes / durations ONLY — never plaintext, keys, tokens, OTP, or recording
# content (a gate asserts this).
management.otlp.tracing.export.enabled=false
# Map the cross-repo OTEL_EXPORTER_OTLP_ENDPOINT convention onto Boot's property (empty
# when unset). To ship traces set BOTH this endpoint and export.enabled=true.
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:}
# The trace's service label (contract default sessionlayer-controlplane).
management.opentelemetry.resource-attributes.service.name=${OTEL_SERVICE_NAME:sessionlayer-controlplane}
# The Gateway root makes the sampling decision; the CP is a child and honours the
# incoming W3C sampled flag (ParentBased). This ratio only governs a CP-ROOTED span
# (an RPC arriving with no traceparent) — sample those fully so a trace is never
# silently dropped at the CP.
management.tracing.sampling.probability=1.0

# ===================== gRPC (CP<->Gateway mTLS plane) ==
# Session Four replaces the S1 dev-plaintext gRPC with a mutually-authenticated
# TLS 1.3 plane (Design §15, VERSIONING.md §7). Boot's own gRPC server autoconfig
# is DISABLED because its NettyServerBuilder is built from ServerCredentials, which
# freezes the protocol negotiator and forbids installing a custom SslContext — and
# our server cert is minted at RUNTIME from the internal mTLS CA (not a static
# keystore/SslBundle), and we require a TLS-1.3-only SslContext with clientAuth
# OPTIONAL + trust=internal CA. So we run a self-managed grpc-netty server
# (GrpcMtlsServer) with full control over the SslContext and the per-RPC AuthInterceptor.
spring.grpc.server.enabled=false

# The mTLS gRPC plane. Now that the channel is authenticated it may bind beyond
# loopback; the sane default binds all interfaces on :9090 (peer identity, not the
# bind address, is the security boundary). Override sessionlayer.mtls.* in deploys.
sessionlayer.mtls.server.enabled=true
sessionlayer.mtls.server.port=9090
sessionlayer.mtls.server.bind-address=0.0.0.0
# SANs stamped into the CP's gRPC server certificate (the Gateway verifies these).
sessionlayer.mtls.server.hostnames=localhost,controlplane
# Credential TTLs / lifecycle (Open values, RESULT §7). Renew-ahead is the Gateway's
# loop; the CP only issues. ISO-8601 durations.
sessionlayer.mtls.identity-cert-ttl=PT24H
sessionlayer.mtls.enrollment-token-ttl=PT10M
sessionlayer.mtls.session-signing-token-ttl=PT120S
# Backdate issued mTLS/leaf certs for clock skew (FR-BOOT-4).
sessionlayer.mtls.cert-backdate=PT2M
# Server-side per-RPC deadline (M3): a hung/saturated DB surfaces as DEADLINE_EXCEEDED.
sessionlayer.mtls.rpc-timeout=PT15S
# Server DoS bounds (M2) have safe in-code defaults (small message/metadata caps, bounded
# concurrency + handler pool, keepalive/connection-age/idle limits); override under
# sessionlayer.mtls.server.* if a deployment needs different values.

# ===================== Agent join & renewable identity (S12) =====================
# The durable Agent credential is the same renewable internal mTLS X.509 identity +
# generation counter the Gateway uses (Design §8, D25/D28), issued by EnrollAgent /
# RenewAgentIdentity on the SAME mTLS gRPC plane. Cert TTL/backdate default to the mtls
# values (independently tunable). Renew-ahead (2/3 TTL ±10%) is the AGENT's loop.
sessionlayer.agent-join.identity-cert-ttl=PT24H
sessionlayer.agent-join.cert-backdate=PT2M
# Single-use, self-destruct join-token TTL (default) and the ceiling a per-request TTL
# override is clamped to. Short-lived by design (FR-JOIN-2).
sessionlayer.agent-join.join-token-ttl=PT10M
sessionlayer.agent-join.join-token-max-ttl=PT1H
# OidcJoin (delegated workload identity: K8s ServiceAccount / CI / cloud OIDC). OFF by
# default; enable + point at the workload ISSUER's JWKS. Verified with the same rigor as
# the user-facing OIDC RP — positive alg allow-list (reject alg:none), iss/aud/exp/nbf —
# then the node-claim's value MUST equal the requested node_name (the node binding). NO
# shared secret is held. Set node-claim to whichever verified claim carries the node name
# (e.g. 'sub' for a per-node workload identity, or a custom claim).
sessionlayer.agent-join.oidc.enabled=false
# sessionlayer.agent-join.oidc.issuer=https://kubernetes.default.svc
# sessionlayer.agent-join.oidc.jwks-uri=https://kubernetes.default.svc/openid/v1/jwks
# sessionlayer.agent-join.oidc.audience=sessionlayer-agents
# sessionlayer.agent-join.oidc.allowed-algs=RS256,ES256
# sessionlayer.agent-join.oidc.clock-skew=PT60S
# sessionlayer.agent-join.oidc.node-claim=sub
# MtlsJoin (operator pre-provisions an agent cert via existing PKI). OFF by default; set
# the operator CA trust anchor(s) as PEM. The operator cert must chain to this anchor, be
# valid, its CN/SAN must match node_name, and a PoP signature must bind it to the CSR.
sessionlayer.agent-join.mtls.enabled=false
# sessionlayer.agent-join.mtls.operator-ca-pem=-----BEGIN CERTIFICATE-----\n...\n-----END CERTIFICATE-----

# ===================== Data access =====================
# Runtime = R2DBC (fully non-blocking), connecting as the RESTRICTED, non-owner,
# non-superuser role `cp_runtime` (created by migration V11) — the writer-role
# hardening (F-append-only-1): a compromised app credential cannot ALTER/DROP,
# cannot DISABLE the audit append-only trigger, and cannot UPDATE/DELETE
# audit_event (INSERT/SELECT only). Flyway keeps the owner role below.
# These localhost defaults match the dev compose Postgres and are overridden by
# SPRING_R2DBC_* env in every real deployment.
spring.r2dbc.url=r2dbc:postgresql://localhost:5432/sessionlayer
spring.r2dbc.username=cp_runtime
spring.r2dbc.password=cp_runtime
# Bound the pool + fail fast on acquisition so a saturated DB surfaces as a clean
# error rather than hanging auth requests indefinitely (the REST auth paths have no
# per-request deadline of their own, unlike the gRPC plane). Tune per deployment.
spring.r2dbc.pool.initial-size=5
spring.r2dbc.pool.max-size=20
spring.r2dbc.pool.max-acquire-time=10s

# Scheduling pool for the periodic maintenance jobs (audit partitioning, JIT expiry
# sweep). Sized >= 2 so a long-running sweep can never starve the other jobs (the
# default size-1 pool would serialize them). Each job also fails soft, never fatal.
spring.task.scheduling.pool.size=2

# Flyway = JDBC-ONLY, runs once at startup as the OWNER/DDL role (creates schemas,
# tables, triggers, AND the restricted cp_runtime role). Overridden by SPRING_FLYWAY_* env.
spring.flyway.url=jdbc:postgresql://localhost:5432/sessionlayer
spring.flyway.user=sessionlayer
spring.flyway.password=sessionlayer
spring.flyway.locations=classpath:db/migration
# V11 sets the cp_runtime login password from this placeholder ON FIRST MIGRATION ONLY
# (Flyway won't re-run V11). DEV DEFAULT ONLY — operators MUST set BOTH this and
# spring.r2dbc.password to the SAME real secret before first boot, using an
# alphanumeric value (no single-quote/backslash — the placeholder is substituted into
# an ALTER ROLE ... PASSWORD literal). Rotate out-of-band: an owner runs
# `ALTER ROLE cp_runtime PASSWORD ...` and spring.r2dbc.password is updated in lockstep;
# changing this placeholder later does NOT rotate anything. Flyway checksums the raw
# file, so changing the value never causes a checksum mismatch.
spring.flyway.placeholders.cpRuntimePassword=cp_runtime

# ===================== Recording WORM store (S3/MinIO) =
# Session Nine session recording (Design §12.2): the CP issues short-lived, single-
# object presigned PUTs to a WORM object store with object-lock; the Gateway uploads
# the ENCRYPTED bytes directly (bytes never proxy through the CP). These localhost
# defaults match the dev compose MinIO; override sessionlayer.recording.worm.* in
# every real deployment and inject creds from the environment (blank access-key ⇒ the
# AWS default credential chain / IAM role). The customer PUBLIC key + retention/mode
# are OPERATOR SETTINGS in the DB (config.operator_settings), not properties.
sessionlayer.recording.worm.endpoint=http://localhost:9000
sessionlayer.recording.worm.region=us-east-1
sessionlayer.recording.worm.bucket=sessionlayer-recordings
sessionlayer.recording.worm.access-key=sessionlayer
sessionlayer.recording.worm.secret-key=sessionlayer-dev-secret
sessionlayer.recording.worm.path-style-access=true
# Short-lived, single-object upload credential TTL (Design §12.2). Issued at upload
# time by RequestUpload (not at Begin), so this need only cover the PUT, not the session.
sessionlayer.recording.worm.credential-ttl=PT120S

# ===================== CA / certificate signing ========
# Local CA KEK (FR-CA-8): set a real 32-byte base64 key in production. If unset, the
# built-in DEV KEK (a public constant) is used, and the app REFUSES TO START unless
# sessionlayer.ca.local.allow-dev-kek=true is explicitly set (dev/test ONLY — never in
# production). This property is deliberately NOT set here so a prod deploy that forgets
# the KEK fails closed rather than silently wrapping the CA key under a public constant.
# For local dev against the compose Postgres, set SESSIONLAYER_CA_LOCAL_ALLOW_DEV_KEK=true
# (or provide a real sessionlayer.ca.local.kek-base64).
# sessionlayer.ca.local.kek-base64=<32-byte base64>
# sessionlayer.ca.local.allow-dev-kek=false  (default; do not enable in production)
