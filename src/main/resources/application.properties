spring.application.name=controlplane

# Build version, resource-filtered from the Maven project version at package time.
# Single source of truth for the SemVer reported by GET /v1/version.
application.version=@project.version@

# ===================== REST server =====================
server.port=8080
# Defense-in-depth slow-client timeouts (prod also sits behind an L7 LB, Design §14).
server.netty.connection-timeout=10s
server.netty.idle-timeout=60s

# ===================== Actuator ========================
# Expose only health + info. Health drives readiness/liveness (incl. the R2DBC
# DB check); it MUST NOT leak identity/node/policy detail, so show-details=never.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# ===================== gRPC (CP<->Gateway mTLS plane) ==
# Session Four replaces the S1 dev-plaintext gRPC with a mutually-authenticated
# TLS 1.3 plane (Design §15, VERSIONING.md §7). Boot's own gRPC server autoconfig
# is DISABLED because its NettyServerBuilder is built from ServerCredentials, which
# freezes the protocol negotiator and forbids installing a custom SslContext — and
# our server cert is minted at RUNTIME from the internal mTLS CA (not a static
# keystore/SslBundle), and we require a TLS-1.3-only SslContext with clientAuth
# OPTIONAL + trust=internal CA. So we run a self-managed grpc-netty server
# (GrpcMtlsServer) with full control over the SslContext and the per-RPC AuthInterceptor.
spring.grpc.server.enabled=false

# The mTLS gRPC plane. Now that the channel is authenticated it may bind beyond
# loopback; the sane default binds all interfaces on :9090 (peer identity, not the
# bind address, is the security boundary). Override sessionlayer.mtls.* in deploys.
sessionlayer.mtls.server.enabled=true
sessionlayer.mtls.server.port=9090
sessionlayer.mtls.server.bind-address=0.0.0.0
# SANs stamped into the CP's gRPC server certificate (the Gateway verifies these).
sessionlayer.mtls.server.hostnames=localhost,controlplane
# Credential TTLs / lifecycle (Open values, RESULT §7). Renew-ahead is the Gateway's
# loop; the CP only issues. ISO-8601 durations.
sessionlayer.mtls.identity-cert-ttl=PT24H
sessionlayer.mtls.enrollment-token-ttl=PT10M
sessionlayer.mtls.session-signing-token-ttl=PT120S
# Backdate issued mTLS/leaf certs for clock skew (FR-BOOT-4).
sessionlayer.mtls.cert-backdate=PT2M

# ===================== Data access =====================
# Runtime = R2DBC (fully non-blocking), connecting as the RESTRICTED, non-owner,
# non-superuser role `cp_runtime` (created by migration V11) — the writer-role
# hardening (F-append-only-1): a compromised app credential cannot ALTER/DROP,
# cannot DISABLE the audit append-only trigger, and cannot UPDATE/DELETE
# audit_event (INSERT/SELECT only). Flyway keeps the owner role below.
# These localhost defaults match the dev compose Postgres and are overridden by
# SPRING_R2DBC_* env in every real deployment.
spring.r2dbc.url=r2dbc:postgresql://localhost:5432/sessionlayer
spring.r2dbc.username=cp_runtime
spring.r2dbc.password=cp_runtime

# Flyway = JDBC-ONLY, runs once at startup as the OWNER/DDL role (creates schemas,
# tables, triggers, AND the restricted cp_runtime role). Overridden by SPRING_FLYWAY_* env.
spring.flyway.url=jdbc:postgresql://localhost:5432/sessionlayer
spring.flyway.user=sessionlayer
spring.flyway.password=sessionlayer
spring.flyway.locations=classpath:db/migration
# V11 sets the cp_runtime login password from this placeholder ON FIRST MIGRATION ONLY
# (Flyway won't re-run V11). DEV DEFAULT ONLY — operators MUST set BOTH this and
# spring.r2dbc.password to the SAME real secret before first boot, using an
# alphanumeric value (no single-quote/backslash — the placeholder is substituted into
# an ALTER ROLE ... PASSWORD literal). Rotate out-of-band: an owner runs
# `ALTER ROLE cp_runtime PASSWORD ...` and spring.r2dbc.password is updated in lockstep;
# changing this placeholder later does NOT rotate anything. Flyway checksums the raw
# file, so changing the value never causes a checksum mismatch.
spring.flyway.placeholders.cpRuntimePassword=cp_runtime

# ===================== CA / certificate signing ========
# Local CA KEK (FR-CA-8): set a real 32-byte base64 key in production. If unset, the
# built-in DEV KEK (a public constant) is used, and the app REFUSES TO START unless
# sessionlayer.ca.local.allow-dev-kek=true is explicitly set (dev/test ONLY — never in
# production). This property is deliberately NOT set here so a prod deploy that forgets
# the KEK fails closed rather than silently wrapping the CA key under a public constant.
# For local dev against the compose Postgres, set SESSIONLAYER_CA_LOCAL_ALLOW_DEV_KEK=true
# (or provide a real sessionlayer.ca.local.kek-base64).
# sessionlayer.ca.local.kek-base64=<32-byte base64>
# sessionlayer.ca.local.allow-dev-kek=false  (default; do not enable in production)
