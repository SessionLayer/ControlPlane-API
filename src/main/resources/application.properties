spring.application.name=controlplane

# Build version, resource-filtered from the Maven project version at package time.
# Single source of truth for the SemVer reported by GET /v1/version.
application.version=@project.version@

# ===================== REST server =====================
server.port=8080
# Defense-in-depth slow-client timeouts (prod also sits behind an L7 LB, Design §14).
server.netty.connection-timeout=10s
server.netty.idle-timeout=60s

# ===================== Actuator ========================
# Expose only health + info. Health drives readiness/liveness (incl. the R2DBC
# DB check); it MUST NOT leak identity/node/policy detail, so show-details=never.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# ===================== gRPC (Handshake plane) ==========
# INSECURE, DEV-ONLY plaintext for the Session One smoke test. Replaced by mTLS
# in Session Four. Standalone Netty gRPC server (servlet multiplexing disabled).
# Bound to loopback so the unauthenticated plaintext RPC is not reachable off-host
# (the smoke connects to 127.0.0.1:9090). Revisit the bind address in Session Four.
spring.grpc.server.port=9090
spring.grpc.server.address=127.0.0.1
spring.grpc.server.servlet.enabled=false

# ===================== Data access =====================
# Runtime = R2DBC (fully non-blocking). These localhost defaults match the dev
# compose Postgres and are overridden by SPRING_R2DBC_* env in every real
# deployment. Not secrets: identical values are published in docker-compose.yml.
spring.r2dbc.url=r2dbc:postgresql://localhost:5432/sessionlayer
spring.r2dbc.username=sessionlayer
spring.r2dbc.password=sessionlayer

# Flyway = JDBC-ONLY, runs once at startup against a dedicated migration
# datasource (never serves requests). Overridden by SPRING_FLYWAY_* env.
spring.flyway.url=jdbc:postgresql://localhost:5432/sessionlayer
spring.flyway.user=sessionlayer
spring.flyway.password=sessionlayer
spring.flyway.locations=classpath:db/migration
