# ControlPlane-API CI — the branch-protection required check is the single job
# `gate`. Do not rename it, add a `name:`, or introduce a matrix: the required
# status check is literally "gate" and a mismatch hangs auto-merge.
#
# All actions are pinned to a full commit SHA (with a version comment) so a moved
# tag can never change what runs. Least-privilege: read-only token by default.
name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so contracts/lint.sh can diff proto against the `main`
          # baseline (buf breaking). On first introduction (main has no
          # contracts/proto yet) the check skips cleanly; from Session Two it runs.
          fetch-depth: 0

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Set up buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # No system protoc step: the ascopes protobuf-maven-plugin resolves the exact
      # protoc (4.34.2) + protoc-gen-grpc-java (1.80.0) from Maven Central during the
      # build — more reproducible than a system protoc, and buf lint has its own parser.

      - name: Cache OWASP dependency-check NVD data
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .dependency-check-data
          # Immutable per-run key + prefix restore keeps the NVD cache fresh across runs.
          key: owasp-dc-${{ github.run_id }}
          restore-keys: |
            owasp-dc-

      - name: Run gate
        env:
          # Present as a repo secret => authenticated, faster, more reliable NVD
          # updates. Absent => gate.sh falls back to unauthenticated (rate-limited) NVD.
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./scripts/gate.sh
