# Dependabot keeps dependencies current and surfaces GitHub security advisories
# as pull requests. It replaces the in-CI OWASP dependency-check/NVD gate
# (removed for its NVD-API-key requirement and slow, flaky cold NVD downloads).
# Update PRs run through the normal `gate` CI check before auto-merge.
version: 2
updates:
  # Maven dependencies + plugins (pom.xml at the repo root).
  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - java
    commit-message:
      prefix: deps

  # GitHub Actions used by .github/workflows (kept SHA-pinned; Dependabot bumps
  # the pin and the version comment together).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
